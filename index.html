<style>

body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:white;
    margin:0;
}

/* Title */

#title{
    font-size:50px;
    font-weight:bold;
    animation: glowCycle 3s infinite;
}

@keyframes glowCycle{
    0%{color:purple;}
    33%{color:red;}
    66%{color:gold;}
    100%{color:purple;}
}

/* Board */

#board{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.row{display:flex;}

.tile{
    width:52px;
    height:52px;
    border:2px solid #d3d6da;
    margin:3px;
    font-size:28px;
    line-height:52px;
    font-weight:bold;
    text-transform:uppercase;
    background:white;
    box-sizing:border-box;
}

.correct{background:#6aaa64;color:white;border-color:#6aaa64;}
.present{background:#c9b458;color:white;border-color:#c9b458;}
.absent{background:#787c7e;color:white;border-color:#787c7e;}

/* Keyboard */

#keyboard{
    margin-top:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
}

.keyboard-row{
    display:flex;
    gap:6px;
    justify-content:center;
    width:100%;
}

.key{
    flex:1;
    max-width:38px;
    height:42px;

    background:#e6ebef;
    border-radius:6px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-weight:bold;
    font-size:16px;
    user-select:none;
}

/* Special Keys */

.specialKey{
    flex:1.5;
    max-width:70px;
    background:#4a90e2;
    color:white;
}

/* Keyboard Colors */

.key.correct{background:#6aaa64;color:white;}
.key.present{background:#c9b458;color:white;}
.key.absent{background:#787c7e;color:white;}

</style>
</head>

const wordSet=new Set(wordBank);

/* Seed Engine */

function seed(){
    let d=new Date();
    return d.getFullYear()*10000+
           (d.getMonth()+1)*100+
           d.getDate();
}

function hash(n){
    n=((n>>16)^n)*0x45d9f3b;
    n=((n>>16)^n)*0x45d9f3b;
    return Math.abs((n>>16)^n);
}

const answer=wordBank[hash(seed())%wordBank.length];

/* Game State */

let attempts=0;
let maxAttempts=6;
let gameOver=false;
let currentGuess="";

/* Board */

const board=document.getElementById("board");

for(let i=0;i<maxAttempts;i++){

    let row=document.createElement("div");
    row.className="row";

    for(let j=0;j<5;j++){
        let tile=document.createElement("div");
        tile.className="tile";
        row.appendChild(tile);
    }

    board.appendChild(row);
}

/* Keyboard Layout */

const keyboardLayout=[
["Q","W","E","R","T","Y","U","I","O","P"],
["A","S","D","F","G","H","J","K","L"],
["ENTER","Z","X","C","V","B","N","M","⌫"]
];

const keyboard=document.getElementById("keyboard");

/* Build Keyboard */

keyboardLayout.forEach(rowLetters=>{

    let row=document.createElement("div");
    row.className="keyboard-row";

    rowLetters.forEach(letter=>{

        let key=document.createElement("div");
        key.className="key";

        if(letter==="ENTER" || letter==="⌫"){
            key.classList.add("specialKey");
        }

        key.textContent=letter;

        if(letter==="ENTER")
            key.onclick=submitGuess;

        else if(letter==="⌫")
            key.onclick=()=>{
                currentGuess=currentGuess.slice(0,-1);
                renderRow();
            };

        else
            key.onclick=()=>addLetter(letter);

        row.appendChild(key);
    });

    keyboard.appendChild(row);
});

/* Gameplay */

function addLetter(letter){

    if(gameOver) return;

    if(letter.length===1 && currentGuess.length<5){
        currentGuess+=letter;
        renderRow();
    }
}

function renderRow(){

    let rows=document.querySelectorAll(".row");

    if(attempts>=rows.length) return;

    let tiles=rows[attempts].querySelectorAll(".tile");

    for(let i=0;i<5;i++){
        tiles[i].textContent=currentGuess[i]||"";
    }
}

/* Keyboard Color Matching */

function updateKeyboardColors(){

    let stateMap={};

    document.querySelectorAll(".tile").forEach(tile=>{

        let letter=tile.textContent;
        if(!letter) return;

        if(tile.classList.contains("correct"))
            stateMap[letter]="correct";

        else if(tile.classList.contains("present") &&
                stateMap[letter]!=="correct")
            stateMap[letter]="present";

        else if(tile.classList.contains("absent") &&
                !stateMap[letter])
            stateMap[letter]="absent";
    });

    document.querySelectorAll(".key").forEach(key=>{

        let letter=key.textContent;

        if(stateMap[letter]){
            key.classList.remove("correct","present","absent");
            key.classList.add(stateMap[letter]);
        }
    });
}

/* Submit Guess */

/* Submit Guess */


function submitGuess(){

    if(currentGuess.length!==5 || gameOver) return;

    let guess=currentGuess.toUpperCase();

    if(!wordSet.has(guess)){
        alert("That word is not in this game but your dad loves you!!!");
        return;
    }

    let rows=document.querySelectorAll(".row");
    let tiles=rows[attempts].querySelectorAll(".tile");

    let ans=answer.split("");
    let g=guess.split("");
    let used=Array(5).fill(false);

    for(let i=0;i<5;i++){
        if(g[i]===ans[i]){
            tiles[i].classList.add("correct");
            used[i]=true;
        }
    }

    for(let i=0;i<5;i++){

        if(tiles[i].classList.contains("correct")) continue;

        for(let j=0;j<5;j++){
            if(!used[j] && g[i]===ans[j]){
                tiles[i].classList.add("present");
                used[j]=true;
                break;
            }
        }

        if(!tiles[i].classList.contains("present") &&
           !tiles[i].classList.contains("correct")){
            tiles[i].classList.add("absent");
        }
    }

    attempts++;
    currentGuess="";

    updateKeyboardColors();

    if(guess===answer){

alert("🎉 You solved WORDY!");
gameOver = true;
        document.getElementById("copy-btn").style.display = "block"; // Show button
    }
    else if(attempts >= 6){
        alert("Game Over! The word was: " + answer);
        gameOver = true;
        document.getElementById("copy-btn").style.display = "block"; 

// Show button
  

    }
}
/* Share Results Function */

document.getElementById("copy-btn").onclick = function() {
    let resultText = "WORDY ULTRA RESULT\nAttempts: " + attempts + "/6\n\n";
    let rows = document.querySelectorAll(".row");
    
    // Loop through only the attempts the user made
    for (let i = 0; i < attempts; i++) {
        let tiles = rows[i].querySelectorAll(".tile");
        let rowEmojis = "";
        
        tiles.forEach(tile => {
            if (tile.classList.contains("correct")) {
                rowEmojis += "🟩"; // Green for Correct
            } else if (tile.classList.contains("present")) {
                rowEmojis += "🟨"; // Yellow for Present
            } else {
                rowEmojis += "⬛"; // Black for Absent
            }
        });
        resultText += rowEmojis + "\n";
    }

    // Copy to clipboard
    navigator.clipboard.writeText(resultText).then(() => {
        alert("Results copied to clipboard! You can now paste them in a text message.");
    }).catch(err => {
        alert("Oops, couldn't copy results: " + err);
    });
};
