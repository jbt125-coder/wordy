<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Daily 5 Letter Guess Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#121213;
    color:white;
    margin:0;
}

#gameContainer{
    max-width:500px;
    margin:auto;
    padding-top:20px;
}

#board{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.row{
    display:flex;
}

.tile{
    width:60px;
    height:60px;
    border:2px solid #3a3a3c;
    margin:3px;
    font-size:32px;
    line-height:60px;
    text-transform:uppercase;
    background:#121213;
    color:white;
}

.correct{ background:#538d4e; }
.present{ background:#b59f3b; }
.absent{ background:#3a3a3c; }

#status{
    margin:15px;
    font-size:18px;
}

#keyboardHint{
    margin-top:20px;
    opacity:0.8;
}

</style>
</head>

<body>

<div id="gameContainer">

<h2>Daily 5 Letter Guess Game</h2>

<div id="board"></div>

<div id="status">Type your guess (5 letters)</div>

<div id="keyboardHint">
Start typing anywhere on screen.
</div>

<button onclick="shareResult()">📩 Copy Text Result</button>

</div>

<script>

/* -----------------------------
   500 Word Bank (Add More Here)
   Expand this list to 500+ words
------------------------------ */

const wordBank = [
"APPLE","BRAVE","CRANE","DREAM","FLAME",
"GRASS","HOUSE","LIGHT","MUSIC","NORTH",
"OCEAN","PLANT","QUEST","ROBOT","STONE",
"TIGER","UNITY","VALOR","WATER","YOUTH",

// Add more words here until you reach 500
// Example format:
// "WORLD","HELLO","BEACH","SMILE",

];

/* -----------------------------
   Date Based Word Selection
------------------------------ */

function getDailyWord(){
    let today = new Date();
    let seed = today.getFullYear()*10000 +
               (today.getMonth()+1)*100 +
               today.getDate();

    function hash(n){
        n = ((n >> 16) ^ n) * 0x45d9f3b;
        n = ((n >> 16) ^ n) * 0x45d9f3b;
        n = (n >> 16) ^ n;
        return Math.abs(n);
    }

    return wordBank[hash(seed) % wordBank.length] || "APPLE";
}

const answer = getDailyWord();

let attempts = 0;
let maxAttempts = 5;
let gameOver = false;

const board = document.getElementById("board");

let currentGuess = "";

/* Create Board */
for(let i=0;i<maxAttempts;i++){
    let row = document.createElement("div");
    row.className = "row";

    for(let j=0;j<5;j++){
        let tile = document.createElement("div");
        tile.className = "tile";
        row.appendChild(tile);
    }

    board.appendChild(row);
}

/* Typing Input System */

document.addEventListener("keydown", function(e){

    if(gameOver) return;

    if(e.key === "Backspace"){
        currentGuess = currentGuess.slice(0,-1);
    }
    else if(/^[a-zA-Z]$/.test(e.key) && currentGuess.length < 5){
        currentGuess += e.key.toUpperCase();
    }
    else if(e.key === "Enter"){
        submitGuess();
    }

    renderCurrentRow();
});

/* Render Typing Tiles */

function renderCurrentRow(){

    let rows = document.querySelectorAll(".row");
    let tiles = rows[attempts].querySelectorAll(".tile");

    for(let i=0;i<5;i++){
        tiles[i].textContent = currentGuess[i] || "";
    }
}

/* Submit Guess */

function submitGuess(){

    if(currentGuess.length !== 5) return;

    let guess = currentGuess;
    currentGuess = "";

    let rows = document.querySelectorAll(".row");
    let tiles = rows[attempts].querySelectorAll(".tile");

    let answerArray = answer.split("");

    let guessArray = guess.split("");

    let checkUsed = Array(5).fill(false);

    /* First Pass — Correct Position */
    for(let i=0;i<5;i++){
        if(guessArray[i] === answerArray[i]){
            tiles[i].classList.add("correct");
            checkUsed[i] = true;
        }
    }

    /* Second Pass — Present Letters */
    for(let i=0;i<5;i++){
        if(tiles[i].classList.contains("correct")) continue;

        for(let j=0;j<5;j++){
            if(!checkUsed[j] &&
               guessArray[i] === answerArray[j]){
                tiles[i].classList.add("present");
                checkUsed[j] = true;
                break;
            }
        }

        if(!tiles[i].classList.contains("present") &&
           !tiles[i].classList.contains("correct")){
            tiles[i].classList.add("absent");
        }
    }

    attempts++;

    if(guess === answer){
        document.getElementById("status").textContent =
            "🎉 You guessed the word!";
        gameOver = true;
        return;
    }

    if(attempts >= maxAttempts){
        document.getElementById("status").textContent =
            "Game Over! Word was " + answer;
        gameOver = true;
        return;
    }

    document.getElementById("status").textContent =
        "Try again (" + (maxAttempts-attempts) + " guesses left)";
}

/* Share Result */

function shareResult(){

    let output = "Daily Guess Game Result\\n";
    output += "Attempts used: " + attempts + "\\n\\n";

    document.querySelectorAll(".row").forEach(r=>{
        r.querySelectorAll(".tile").forEach(t=>{
            if(t.classList.contains("correct")) output += "🟩";
            else if(t.classList.contains("present")) output += "🟨";
            else if(t.classList.contains("absent")) output += "⬛";
            else output += "⬜";
        });
        output += "\\n";
    });

    navigator.clipboard.writeText(output)
        .then(()=>alert("Result copied! Paste into text message."));
}

</script>

</body>
</html>
