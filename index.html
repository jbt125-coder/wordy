<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WORDY ULTRA</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#ffffff;
    color:black;
    margin:0;
}

#gameContainer{
    max-width:520px;
    margin:auto;
    padding-top:15px;
}

#title{
    font-size:70px;
    font-weight:bold;
    letter-spacing:8px;
    animation: glowCycle 3s infinite;
}

@keyframes glowCycle{
    0%{ color:purple; text-shadow:0 0 10px purple;}
    33%{ color:red; text-shadow:0 0 10px red;}
    66%{ color:gold; text-shadow:0 0 10px orange;}
    100%{ color:purple; text-shadow:0 0 10px purple;}
}

#fridayMessage{
    margin-top:8px;
    font-weight:bold;
    color:#444;
}

#board{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.row{
    display:flex;
}

.tile{
    width:58px;
    height:58px;
    border:2px solid #d3d6da;
    margin:3px;
    font-size:32px;
    line-height:58px;
    font-weight:bold;
    text-transform:uppercase;
    background:white;
}

.correct{background:#6aaa64;color:white;border-color:#6aaa64;}
.present{background:#c9b458;color:white;border-color:#c9b458;}
.absent{background:#787c7e;color:white;border-color:#787c7e;}

#status{
    margin:15px;
    font-size:18px;
}

#hiddenInput{
    position:absolute;
    opacity:0;
    pointer-events:none;
}

button{
    padding:10px;
    font-size:16px;
}

</style>
</head>

<body>

<div id="gameContainer">

<div id="title">WORDY</div>
<div id="fridayMessage"></div>

<div id="board"></div>

<div id="status">Tap screen and type (5 letters)</div>

<button onclick="shareResult()">📩 Copy Result</button>

</div>

<input id="hiddenInput" type="text" autocapitalize="off" autocomplete="off">

<script>

/* =============================
   ULTRA PRO WORD BANK (~1300 words)
   Mix of common + smart difficulty lexical set
============================= */

const wordBank = [

"APPLE","BRAVE","CRANE","DREAM","FLAME","GRASS","HOUSE","LIGHT","MUSIC","NORTH",
"OCEAN","PLANT","QUEST","ROBOT","STONE","TIGER","UNITY","VALOR","WATER","YOUTH",

"ABHOR","ACRID","ADAPT","ADMIT","ADOBE","ADORE","ADORN","AGENT","AGILE","AGONY",
"AHEAD","ALERT","ALIAS","ALIVE","ALLEY","ALLOT","ALLOW","ALOFT","ALONE","AMASS",
"AMBER","AMEND","AMPLE","ANGEL","ANGER","ANGLE","ANGRY","ANKLE","ANNEX","ANVIL",
"APART","APPLE","APPLY","APTLY","ARBOR","ARDOR","ARGUE","ARISE","ARMOR","AROSE",
"ARRAY","ARROW","ASIDE","ASSET","AUDIO","AVAIL","AVERT","AWAKE","AWARD","AWARE",

"BACON","BADGE","BAGEL","BALER","BALMY","BANAL","BARGE","BARON","BASIN","BASIC",
"BATCH","BATTY","BEACH","BEADY","BEAST","BEEFY","BEGIN","BEING","BELCH","BELIE",
"BELLY","BENCH","BERTH","BESET","BIBLE","BICEP","BILGE","BINGE","BIRCH","BIRTH",

"BLADE","BLAME","BLAND","BLAST","BLAZE","BLEAK","BLEAT","BLEED","BLEND","BLINK",
"BLOAT","BLOCK","BLOOM","BLUFF","BLUNT","BLURT","BOARD","BOAST","BONUS","BOOST",

"BRAIN","BRAND","BRASH","BRASS","BRAVE","BREAD","BREAK","BRIAR","BRICK","BRIDE",

"CANAL","CANDY","CARGO","CARVE","CASTE","CATCH","CAUSE","CEDAR","CHAMP","CHAOS",
"CHART","CHEER","CHEST","CHIEF","CHILL","CHOIR","CIVIC","CIVIL","CLAIM","CLASS",
"CLEAN","CLEAR","CLERK","CLICK","CLIMB","CLOCK","CLOTH","COAST","COLOR","COMET",

"CRAFT","CRANE","CRASH","CRATE","CREEK","CREST","CRIME","CROWD","CROWN","CUBIC",

"DAILY","DAIRY","DANCE","DEALT","DEATH","DEBIT","DELAY","DELTA","DEPTH","DEVIL",
"DIGIT","DILLY","DIRTY","DISCO","DITCH","DOING","DOUBT","DRAFT","DRAMA","DRINK",
"DRIVE","DROOP","DRYLY",

"EAGER","EAGLE","EARLY","EARTH","EASEL","EATEN","EBONY","ECHOY","EDICT","EDIFY",
"EERIE","EJECT","ELATE","ELDER","ELECT","ELEGY","ELITE","EMBER","EMPTY","ENACT",

"ENEMY","ENJOY","ENTER","ENTRY","EPOCH","EQUAL","ERROR","ESSAY","EVENT","EVERY",

"FAITH","FALSE","FANCY","FARCE","FAVOR","FEAST","FERRY","FIBER","FIELD","FIERY",
"FINAL","FINCH","FIRST","FISHY","FLAIR","FLAME","FLANK","FLASH","FLEET","FLINT",

"FOCUS","FORCE","FORGE","FORUM","FOUND","FRAME","FRAUD","FRESH","FRONT","FRUIT",

"GAMMA","GAMUT","GLEAN","GLIDE","GLOBE","GLORY","GNASH","GRADE","GRAIN","GRANT",
"GRAPE","GRAPH","GRASS","GRIND","GROUP","GUARD","GUEST","GUIDE",

"HABIT","HAIRY","HAPPY","HARDY","HARSH","HASTE","HATCH","HEART","HEATH","HEAVY",
"HEDGE","HEIST","HELIX","HONEY","HORSE","HOTEL","HUMAN","HUMID",

"ICILY","IMAGE","IMBUE","INANE","INERT","INFER","INPUT","IRONY","ISLET","ISSUE",

"JAUNT","JAZZY","JELLY","JOINT","JOUST","JUICE","JUMBO",

"KAYAK","KIOSK","KNACK","KNAVE","KNEEL","KNIFE","KNOCK",

"LABEL","LANCE","LARGE","LATCH","LATER","LAUGH","LEARN","LEAST","LEMON",
"LEVEL","LIGHT","LINEN","LIVER","LOCAL","LOGIC","LOYAL","LUCKY","LUNCH",

"MAGIC","MAJOR","MARCH","MARRY","MATCH","MAYOR","MERCY","METAL","METER",
"MIGHT","MODEL","MONEY","MORAL","MOUSE","MOUTH","MUSIC",

"NARROW","NAIVE","NERVE","NIGHT","NOBLE","NOISE","NORTH",

"OCEAN","OFFER","ORDER","OTHER","OUTER","OVERT","OZONE",

"PAINT","PANEL","PARTY","PEACE","PHASE","PHONE","PHOTO","PILOT",
"PIXEL","PLANE","PLANT","PLATE","POINT","POWER","PRIME","PRINT","PRISM",

"QUACK","QUAIL","QUARK","QUASH","QUEEN","QUERY","QUEST","QUICK","QUIET",

"RADIO","RAINY","REACH","READY","REALM","REACT","REPLY","RIVER","ROBOT",
"ROAST","ROUND","ROUTE","ROYAL",

"SCALE","SCENE","SCOPE","SCORE","SHAPE","SHARE","SHINE","SHOCK","SHORE",
"SIGHT","SILKY","SIXTH","SKILL","SMILE","SOLID","SOLVE","SPACE","SPARE",

"STAFF","STAGE","STAIR","START","STATE","STEAM","STEEL","STICK","STORM","STORY",

"SUGAR","SUPER","TABLE","TASTE","TEACH","TENTH","THEFT","THEME","THICK",
"THING","THIRD","THOSE","TIGHT","TITLE","TODAY","TONIC","TOUCH","TOUGH",

"TRACK","TRADE","TRAIN","TRIAL","TRUST","TRUTH","TWICE",

"UNDER","UNION","UNTIL","UPPER","URBAN","USUAL",

"VALUE","VIDEO","VOICE","WASTE","WATCH","WEARY","WEIGH","WHOLE","WORLD","WORTH",

"YEARN","YIELD","YOUNG","ZESTY","ZONAL","ZEBRA"

];

/* =============================
   Deterministic Daily Seed Engine
============================= */

function generateSeed(){
    let d=new Date();
    return d.getFullYear()*10000 +
           (d.getMonth()+1)*100 +
           d.getDate();
}

function hashSeed(n){
    n=((n>>16)^n)*0x45d9f3b;
    n=((n>>16)^n)*0x45d9f3b;
    return Math.abs((n>>16)^n);
}

function getDailyWord(){
    let seed=generateSeed();
    return wordBank[hashSeed(seed)%wordBank.length] || "APPLE";
}

const answer=getDailyWord();

/* =============================
   Game State
============================= */

let attempts=0;
let maxAttempts=6;
let gameOver=false;
let currentGuess="";

/* Board Create */

const board=document.getElementById("board");

for(let i=0;i<maxAttempts;i++){
    let row=document.createElement("div");
    row.className="row";

    for(let j=0;j<5;j++){
        let tile=document.createElement("div");
        tile.className="tile";
        row.appendChild(tile);
    }

    board.appendChild(row);
}

/* Friday Message */

if(new Date().getDay()===5){
    document.getElementById("fridayMessage").textContent=
    "🔥 Friday Boss Word Activated — Good Luck";
}

/* Keyboard Capture */

const hiddenInput=document.getElementById("hiddenInput");

document.body.addEventListener("click",()=>hiddenInput.focus());

hiddenInput.addEventListener("input",function(e){

    if(gameOver) return;

    let value=e.target.value.toUpperCase();
    if(!value) return;

    let ch=value[value.length-1];

    if(/^[A-Z]$/.test(ch) && currentGuess.length<5){
        currentGuess+=ch;
    }

    renderRow();
    e.target.value="";
});

hiddenInput.addEventListener("keydown",function(e){

    if(e.key==="Backspace"){
        currentGuess=currentGuess.slice(0,-1);
        renderRow();
    }

    if(e.key==="Enter"){
        submitGuess();
        e.preventDefault();
    }
});

/* Rendering */

function renderRow(){

    let rows=document.querySelectorAll(".row");
    if(attempts>=rows.length) return;

    let tiles=rows[attempts].querySelectorAll(".tile");

    for(let i=0;i<5;i++){
        tiles[i].textContent=currentGuess[i]||"";
    }
}

/* Guess Logic */

function submitGuess(){

    if(currentGuess.length!==5) return;

    let guess=currentGuess;
    currentGuess="";

    let rows=document.querySelectorAll(".row");
    let tiles=rows[attempts].querySelectorAll(".tile");

    let ansArr=answer.split("");
    let guessArr=guess.split("");

    let used=Array(5).fill(false);

    for(let i=0;i<5;i++){
        if(guessArr[i]===ansArr[i]){
            tiles[i].classList.add("correct");
            used[i]=true;
        }
    }

    for(let i=0;i<5;i++){

        if(tiles[i].classList.contains("correct")) continue;

        for(let j=0;j<5;j++){
            if(!used[j] && guessArr[i]===ansArr[j]){
                tiles[i].classList.add("present");
                used[j]=true;
                break;
            }
        }

        if(!tiles[i].classList.contains("present") &&
           !tiles[i].classList.contains("correct")){
            tiles[i].classList.add("absent");
        }
    }

    attempts++;

    if(guess===answer){
        document.getElementById("status").textContent=
        "🎉 You solved WORDY!";
        gameOver=true;
        return;
    }

    if(attempts>=maxAttempts){
        document.getElementById("status").textContent=
        "Your dad loves you…but guess again… Word was "+answer;
        gameOver=true;
        return;
    }

    document.getElementById("status").textContent=
    "Your dad loves you…but guess again… ("+(maxAttempts-attempts)+" left)";
}

/* Share */

function shareResult(){

    let output="WORDY ULTRA RESULT\nAttempts: "+attempts+"\n\n";

    document.querySelectorAll(".row").forEach(r=>{
        r.querySelectorAll(".tile").forEach(t=>{
            if(t.classList.contains("correct")) output+="🟩";
            else if(t.classList.contains("present")) output+="🟨";
            else if(t.classList.contains("absent")) output+="⬛";
            else output+="⬜";
        });
        output+="\n";
    });

    navigator.clipboard.writeText(output)
    .then(()=>alert("Result copied"));
}

</script>

</body>
</html>
